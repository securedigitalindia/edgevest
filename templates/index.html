<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drishti — Trade Manager</title>
<style>
  :root {
    --bg:       #f1f5f9;
    --card:     #ffffff;
    --border:   #e2e8f0;
    --text:     #1e293b;
    --muted:    #64748b;
    --blue:     #3b82f6;
    --green:    #16a34a;
    --red:      #dc2626;
    --radius:   10px;
    --shadow:   0 1px 4px rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--text); font-size: 14px; }

  /* ── Header ── */
  header { background: #0f172a; color: #fff; padding: 0 24px;
           display: flex; align-items: center; gap: 16px; height: 48px; }
  header h1 { font-size: 15px; font-weight: 700; letter-spacing: .3px; }
  .spot-bar { display: flex; gap: 20px; margin-left: auto; align-items: center; }
  .spot-item { font-size: 12px; color: #94a3b8; }
  .spot-item strong { color: #fff; font-size: 13px; margin-left: 4px; }
  .spot-item.up strong   { color: #4ade80; }
  .spot-item.down strong { color: #f87171; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80;
              animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .last-updated { font-size: 11px; color: #475569; }

  /* ── Layout ── */
  .layout { display: grid; grid-template-columns: 460px 1fr; gap: 20px;
            padding: 20px 24px; max-width: 1300px; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  /* ── Cards ── */
  .card { background: var(--card); border: 1px solid var(--border);
          border-radius: var(--radius); box-shadow: var(--shadow); }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border);
                 display: flex; align-items: center; justify-content: space-between; }
  .card-header h2 { font-size: 13px; font-weight: 600; text-transform: uppercase;
                    letter-spacing: .5px; color: var(--muted); }
  .card-body { padding: 16px; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px;
         border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer;
         border: none; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-danger  { background: var(--red);  color: #fff; }
  .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-sm      { padding: 4px 10px; font-size: 12px; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ── Form ── */
  input, select { width: 100%; padding: 7px 10px; border: 1px solid var(--border);
                  border-radius: 6px; font-size: 13px; color: var(--text);
                  background: #fff; outline: none; transition: border .15s; }
  input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px #eff6ff; }
  input::placeholder { color: #94a3b8; }
  label { font-size: 11px; font-weight: 600; color: var(--muted);
          display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
  .form-row { margin-bottom: 12px; }

  /* ── Leg rows ── */
  .legs-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .leg-row { border: 1px solid var(--border); border-radius: 8px; padding: 12px 12px 10px;
             position: relative; background: #fafafa; }
  .leg-num { font-size: 11px; font-weight: 700; color: var(--muted);
             text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .remove-leg { position: absolute; top: 10px; right: 10px; background: none;
                border: none; color: #cbd5e1; cursor: pointer; font-size: 18px;
                line-height: 1; padding: 0; }
  .remove-leg:hover { color: var(--red); }

  .search-wrap { position: relative; margin-bottom: 8px; }
  .search-results { position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
                    background: #fff; border: 1px solid var(--border); border-top: none;
                    border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto;
                    box-shadow: 0 6px 16px rgba(0,0,0,.1); display: none; }
  .search-results.open { display: block; }
  .result-item { padding: 9px 12px; cursor: pointer; font-size: 13px;
                 border-bottom: 1px solid #f1f5f9; }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover, .result-item.focused { background: #eff6ff; }

  .selected-pill { display: none; align-items: center; gap: 8px; margin-bottom: 8px;
                   background: #eff6ff; border: 1px solid #bfdbfe;
                   border-radius: 6px; padding: 6px 10px; }
  .selected-pill.visible { display: flex; }
  .selected-pill span { font-size: 13px; color: #1d4ed8; font-weight: 500; flex: 1; }
  .pill-clear { cursor: pointer; color: #93c5fd; font-size: 16px; }
  .pill-clear:hover { color: var(--red); }

  .leg-fields { display: grid; grid-template-columns: 80px 80px 1fr; gap: 8px; }
  .leg-fields.hidden { display: none; }

  .add-leg-btn { width: 100%; padding: 8px; border: 1.5px dashed #cbd5e1;
                 border-radius: 6px; background: none; color: var(--muted);
                 cursor: pointer; font-size: 13px; transition: all .15s; }
  .add-leg-btn:hover { border-color: var(--blue); color: var(--blue); background: #eff6ff; }

  /* ── Trade cards ── */
  .trade-card { border: 1px solid var(--border); border-radius: 8px;
                margin-bottom: 12px; overflow: hidden; background: #fff; }
  .trade-card-header { padding: 10px 14px; background: #f8fafc;
                       display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .trade-symbol { font-weight: 700; font-size: 15px; }
  .badge-open { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
                background: #dcfce7; color: #166534; }
  .trade-since { font-size: 11px; color: var(--muted); margin-left: auto; }

  .legs-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .legs-table th { font-size: 11px; font-weight: 600; color: var(--muted);
                   text-align: left; padding: 6px 12px; border-bottom: 1px solid var(--border);
                   text-transform: uppercase; letter-spacing: .4px; background: #f8fafc; }
  .legs-table td { padding: 8px 12px; border-bottom: 1px solid #f8fafc; }
  .legs-table tr:last-child td { border-bottom: none; }
  .side-buy  { color: var(--green); font-weight: 700; }
  .side-sell { color: var(--red);   font-weight: 700; }

  .ltp-cell { font-weight: 600; color: var(--text); }
  .pnl-positive { color: var(--green); font-weight: 600; }
  .pnl-negative { color: var(--red);   font-weight: 600; }
  .pnl-neutral  { color: var(--muted); }

  .net-pnl-bar { padding: 8px 14px; background: #f8fafc; border-top: 1px solid var(--border);
                 display: flex; align-items: center; justify-content: space-between; }
  .net-pnl-label { font-size: 12px; color: var(--muted); }
  .net-pnl-value { font-size: 15px; font-weight: 700; }

  .trade-footer { padding: 10px 14px; border-top: 1px solid var(--border);
                  display: flex; gap: 8px; align-items: center; }

  /* ── Exit form ── */
  .exit-form { display: none; padding: 14px; border-top: 2px solid #fee2e2; background: #fff9f9; }
  .exit-form.open { display: block; }
  .exit-form h4 { font-size: 12px; font-weight: 700; color: var(--red);
                  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
  .exit-leg-row { display: grid; grid-template-columns: 1fr 130px; gap: 10px;
                  align-items: center; margin-bottom: 10px; }
  .exit-leg-info .side { font-weight: 700; }
  .exit-leg-info .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .exit-form-footer { display: flex; gap: 8px; margin-top: 14px; align-items: center; }
  .exit-form-footer .note-wrap { flex: 1; }

  /* ── Misc ── */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 18px;
           border-radius: 8px; font-size: 13px; font-weight: 500; max-width: 340px;
           box-shadow: 0 4px 16px rgba(0,0,0,.15); opacity: 0;
           transition: opacity .3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  .toast.ok  { background: #166534; color: #fff; }
  .toast.err { background: var(--red); color: #fff; }
  .skeleton { background: #e2e8f0; border-radius: 4px; height: 12px; }
</style>
</head>
<body>

<header>
  <h1>📊 Drishti</h1>
  <div class="spot-bar" id="spot-bar">
    <span class="last-updated" id="last-updated"></span>
  </div>
  <div class="live-dot" title="Live prices polling"></div>
</header>

<div class="layout">

  <!-- LEFT: Create Trade -->
  <div>
    <div class="card">
      <div class="card-header"><h2>New Trade</h2></div>
      <div class="card-body">
        <div class="legs-list" id="legs-list"></div>
        <button class="add-leg-btn" onclick="addLeg()">+ Add Leg</button>

        <div class="form-row" style="margin-top:14px">
          <label>Note (optional)</label>
          <input id="create-note" placeholder="e.g. Bull put spread">
        </div>

        <button class="btn btn-primary" style="width:100%;justify-content:center"
                id="create-btn" onclick="createTrade()">
          Create Trade &amp; Send Alert
        </button>
      </div>
    </div>
  </div>

  <!-- RIGHT: Open Positions -->
  <div>
    <div class="card">
      <div class="card-header">
        <h2>Open Positions</h2>
        <button class="btn btn-ghost btn-sm" onclick="loadTrades()">↻ Refresh</button>
      </div>
      <div class="card-body" style="padding:12px">
        <div id="trades-list"><div class="empty">Loading...</div></div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────
// Leg management
// ─────────────────────────────────────────────────────────

let legCounter = 0;
const _legData = {};

function addLeg() {
  legCounter++;
  const n = legCounter;
  const div = document.createElement('div');
  div.className = 'leg-row';
  div.id = `leg-${n}`;
  div.innerHTML = `
    <div class="leg-num">Leg ${document.querySelectorAll('.leg-row').length + 1}</div>
    <button class="remove-leg" onclick="removeLeg(${n})">✕</button>

    <div class="search-wrap">
      <input class="leg-search" id="search-${n}" autocomplete="off"
             placeholder="Search: nifty 25000 ce  /  banknifty fut  /  banknifty 57000 pe may"
             oninput="debounceSearch(${n})"
             onkeydown="handleSearchKey(event, ${n})">
      <div class="search-results" id="results-${n}"></div>
    </div>

    <div class="selected-pill" id="sel-${n}">
      <span id="sel-label-${n}"></span>
      <span class="pill-clear" onclick="clearLeg(${n})">✕</span>
    </div>

    <div class="leg-fields hidden" id="fields-${n}">
      <div><label>Side</label>
        <select id="side-${n}"><option value="BUY">BUY</option><option value="SELL">SELL</option></select>
      </div>
      <div><label>Lots</label>
        <input type="number" id="lots-${n}" min="1" placeholder="1">
      </div>
      <div><label>Price</label>
        <input type="number" id="price-${n}" step="0.05" placeholder="0.00">
      </div>
    </div>`;
  document.getElementById('legs-list').appendChild(div);
  document.getElementById(`search-${n}`).focus();
  renumberLegs();
}

function removeLeg(n) {
  document.getElementById(`leg-${n}`)?.remove();
  renumberLegs();
}

function renumberLegs() {
  document.querySelectorAll('.leg-row .leg-num').forEach((el, i) => el.textContent = `Leg ${i+1}`);
}

// ─────────────────────────────────────────────────────────
// Instrument search
// ─────────────────────────────────────────────────────────

const _timers = {};
const _resultCache = {};

function debounceSearch(n) {
  clearTimeout(_timers[n]);
  _timers[n] = setTimeout(() => fetchSearch(n), 320);
}

function handleSearchKey(e, n) {
  const box = document.getElementById(`results-${n}`);
  const items = box.querySelectorAll('.result-item');
  const focused = box.querySelector('.result-item.focused');
  let idx = [...items].indexOf(focused);

  if (e.key === 'ArrowDown') { e.preventDefault(); items[Math.min(idx+1, items.length-1)]?.classList.add('focused'); focused?.classList.remove('focused'); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); items[Math.max(idx-1, 0)]?.classList.add('focused'); focused?.classList.remove('focused'); }
  else if (e.key === 'Enter' && focused) { e.preventDefault(); focused.click(); }
  else if (e.key === 'Escape') closeDropdown(n);
}

async function fetchSearch(n) {
  const q = document.getElementById(`search-${n}`).value.trim();
  const box = document.getElementById(`results-${n}`);
  if (q.length < 2) { closeDropdown(n); return; }

  const res  = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
  const data = await res.json();
  box._data  = data.results;

  if (!data.results.length) {
    box.innerHTML = '<div class="result-item" style="color:#94a3b8;cursor:default">No results — try e.g. "nifty 25000 ce"</div>';
  } else {
    box.innerHTML = data.results.map((r, i) =>
      `<div class="result-item" onclick="selectInstrument(${n},${i})">${r.label}</div>`
    ).join('');
  }
  box.classList.add('open');
}

function selectInstrument(n, i) {
  const box  = document.getElementById(`results-${n}`);
  const item = box._data[i];
  _legData[n] = item;

  document.getElementById(`search-${n}`).style.display = 'none';
  closeDropdown(n);

  document.getElementById(`sel-label-${n}`).textContent = item.label;
  document.getElementById(`sel-${n}`).classList.add('visible');
  document.getElementById(`fields-${n}`).classList.remove('hidden');
  document.getElementById(`lots-${n}`).focus();
}

function clearLeg(n) {
  delete _legData[n];
  const s = document.getElementById(`search-${n}`);
  s.style.display = ''; s.value = ''; s.focus();
  document.getElementById(`sel-${n}`).classList.remove('visible');
  document.getElementById(`fields-${n}`).classList.add('hidden');
}

function closeDropdown(n) {
  document.getElementById(`results-${n}`)?.classList.remove('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap'))
    document.querySelectorAll('.search-results').forEach(el => el.classList.remove('open'));
});

// ─────────────────────────────────────────────────────────
// Create trade
// ─────────────────────────────────────────────────────────

async function createTrade() {
  const legEls = document.querySelectorAll('.leg-row');
  if (!legEls.length) { showToast('Add at least one leg', 'err'); return; }

  const legs = [];
  let symbol = null;

  for (const el of legEls) {
    const n   = parseInt(el.id.split('-')[1]);
    const ins = _legData[n];
    if (!ins) { showToast('Select an instrument for each leg', 'err'); return; }

    const side  = document.getElementById(`side-${n}`).value;
    const lots  = parseInt(document.getElementById(`lots-${n}`).value);
    const price = parseFloat(document.getElementById(`price-${n}`).value);

    if (!lots || lots < 1)    { showToast(`Leg ${n}: enter a valid lot count`, 'err'); return; }
    if (!price || price <= 0) { showToast(`Leg ${n}: enter a valid price`, 'err'); return; }

    symbol = ins.symbol;
    const leg = { side, type: ins.instrument_type, lots, price };
    if (ins.strike)     leg.strike = ins.strike;
    if (ins.expiry_str) leg.expiry = ins.expiry_str;
    legs.push(leg);
  }

  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.textContent = 'Creating…';

  try {
    const res  = await fetch('/api/trades/create', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ symbol, legs, note: document.getElementById('create-note').value }),
    });
    const data = await res.json();
    if (data.ok) {
      showToast(`Trade created (id=${data.trade_id}) — Telegram alert sent ✓`, 'ok');
      resetForm();
      await loadTrades();
      updatePrices();
    } else {
      showToast(data.error || 'Create failed', 'err');
    }
  } catch(e) { showToast('Network error', 'err'); }

  btn.disabled = false; btn.textContent = 'Create Trade & Send Alert';
}

function resetForm() {
  document.getElementById('legs-list').innerHTML = '';
  document.getElementById('create-note').value = '';
  Object.keys(_legData).forEach(k => delete _legData[k]);
  legCounter = 0;
  addLeg();
}

// ─────────────────────────────────────────────────────────
// Open trades
// ─────────────────────────────────────────────────────────

let _trades = [];

async function loadTrades() {
  document.getElementById('trades-list').innerHTML = '<div class="empty">Loading…</div>';
  try {
    const res  = await fetch('/api/trades');
    const data = await res.json();
    _trades = data.trades;
    renderTrades();
  } catch(e) {
    document.getElementById('trades-list').innerHTML = '<div class="empty">Failed to load.</div>';
  }
}

function renderTrades() {
  const list = document.getElementById('trades-list');
  if (!_trades.length) { list.innerHTML = '<div class="empty">No open positions.</div>'; return; }
  list.innerHTML = _trades.map(renderTradeCard).join('');
}

function renderTradeCard(t) {
  const legRows = t.legs.map((l, i) => {
    const sc     = l.side === 'BUY' ? 'side-buy' : 'side-sell';
    const strike = l.strike ? `${Number(l.strike).toLocaleString('en-IN')} ` : '';
    const expiry = l.expiry_str ? ` ${l.expiry_str}` : '';
    const entry  = l.price != null ? fmtRs(l.price) : '—';
    return `<tr>
      <td class="${sc}">${l.side}</td>
      <td>${strike}${l.instrument_type}${expiry}</td>
      <td>${l.lots}L</td>
      <td>${entry}</td>
      <td class="ltp-cell" id="ltp-${t.id}-${i}">—</td>
      <td class="pnl-neutral" id="pnl-${t.id}-${i}">—</td>
    </tr>`;
  }).join('');

  const exitInputs = t.legs.map((l, i) => {
    const strike = l.strike ? `${Number(l.strike).toLocaleString('en-IN')} ` : '';
    const expiry = l.expiry_str ? ` · ${l.expiry_str}` : '';
    return `<div class="exit-leg-row">
      <div class="exit-leg-info">
        <span class="side ${l.side === 'BUY' ? 'side-buy':'side-sell'}">${l.side}</span>
        &nbsp;${strike}${l.instrument_type} · ${l.lots}L${expiry}
        <div class="meta">entry ${fmtRs(l.price)}</div>
      </div>
      <div>
        <label>Exit price</label>
        <input type="number" step="0.05" id="xprice-${t.id}-${i}" placeholder="0.00">
      </div>
    </div>`;
  }).join('');

  return `<div class="trade-card" id="card-${t.id}">
    <div class="trade-card-header">
      <span class="trade-symbol">${t.symbol}</span>
      <span class="badge-open">Open</span>
      <span class="trade-since">${t.entry_ist}</span>
    </div>
    <table class="legs-table">
      <thead><tr>
        <th>Side</th><th>Instrument</th><th>Lots</th>
        <th>Entry</th><th>LTP</th><th>P&amp;L</th>
      </tr></thead>
      <tbody>${legRows}</tbody>
    </table>
    <div class="net-pnl-bar">
      <span class="net-pnl-label">Net P&amp;L</span>
      <span class="net-pnl-value pnl-neutral" id="net-${t.id}">—</span>
    </div>
    <div class="trade-footer">
      <button class="btn btn-danger btn-sm" onclick="toggleExit(${t.id})">Exit Trade</button>
    </div>
    <div class="exit-form" id="xform-${t.id}">
      <h4>Enter Exit Prices</h4>
      ${exitInputs}
      <div class="exit-form-footer">
        <div class="note-wrap">
          <input id="xnote-${t.id}" placeholder="Note (optional)">
        </div>
        <button class="btn btn-danger btn-sm" onclick="submitExit(${t.id},${t.legs.length})">Confirm Exit</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleExit(${t.id})">Cancel</button>
      </div>
    </div>
  </div>`;
}

function toggleExit(id) {
  document.getElementById(`xform-${id}`).classList.toggle('open');
}

async function submitExit(id, legCount) {
  const prices = [];
  for (let i = 0; i < legCount; i++) {
    const p = parseFloat(document.getElementById(`xprice-${id}-${i}`).value);
    if (!p || p <= 0) { showToast(`Enter exit price for leg ${i+1}`, 'err'); return; }
    prices.push(p);
  }
  const note = document.getElementById(`xnote-${id}`).value;

  try {
    const res  = await fetch(`/api/trades/${id}/exit`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ prices, note }),
    });
    const data = await res.json();
    if (data.ok) {
      showToast('Trade closed — Telegram alert sent ✓', 'ok');
      await loadTrades();
      updatePrices();
    } else {
      showToast(data.error || 'Exit failed', 'err');
    }
  } catch(e) { showToast('Network error', 'err'); }
}

// ─────────────────────────────────────────────────────────
// Live prices
// ─────────────────────────────────────────────────────────

async function updatePrices() {
  if (!_trades.length) return;

  // Collect all leg instrument keys
  const ikeys = [...new Set(
    _trades.flatMap(t => t.legs.map(l => l.instrument_key).filter(Boolean))
  )];
  if (!ikeys.length) return;

  try {
    const res    = await fetch('/api/prices', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ keys: ikeys }),
    });
    const prices = await res.json();

    for (const t of _trades) {
      let netPnl = 0, allKnown = true;

      t.legs.forEach((l, i) => {
        const ltp    = prices[l.instrument_key];
        const ltpEl  = document.getElementById(`ltp-${t.id}-${i}`);
        const pnlEl  = document.getElementById(`pnl-${t.id}-${i}`);
        if (!ltpEl) return;

        if (ltp == null) { allKnown = false; return; }

        ltpEl.textContent = fmtRs(ltp);

        const qty    = l.lots * (l.lot_size || 1);
        const legPnl = l.side === 'SELL' ? (l.price - ltp) * qty : (ltp - l.price) * qty;
        netPnl += legPnl;

        if (pnlEl) {
          pnlEl.textContent  = fmtPnl(legPnl);
          pnlEl.className    = legPnl >= 0 ? 'pnl-positive' : 'pnl-negative';
        }
      });

      const netEl = document.getElementById(`net-${t.id}`);
      if (netEl && allKnown) {
        netEl.textContent = fmtPnl(netPnl);
        netEl.className   = `net-pnl-value ${netPnl >= 0 ? 'pnl-positive' : 'pnl-negative'}`;
      }
    }

    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  } catch(e) { /* silent — prices will show — when available */ }
}

async function updateSpot() {
  try {
    const res  = await fetch('/api/spot');
    const data = await res.json();
    const bar  = document.getElementById('spot-bar');

    const items = Object.entries(data).map(([sym, ltp]) =>
      `<span class="spot-item"><span style="color:#94a3b8;font-size:11px">${sym}</span><strong>${fmtRs(ltp)}</strong></span>`
    ).join('');

    // Keep last-updated span
    const lastEl = document.getElementById('last-updated');
    bar.innerHTML = items;
    bar.appendChild(lastEl);
  } catch(e) {}
}

// ─────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────

function fmtRs(n) {
  if (n == null) return '—';
  return '₹' + Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtPnl(n) {
  const sign = n >= 0 ? '+' : '';
  return `₹${sign}${Math.round(n).toLocaleString('en-IN')}`;
}

let _toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `toast ${type} show`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
}

// ─────────────────────────────────────────────────────────
// Init & polling
// ─────────────────────────────────────────────────────────

addLeg();
loadTrades().then(() => { updatePrices(); updateSpot(); });

// Poll every 5 s
setInterval(() => { updatePrices(); updateSpot(); }, 5000);
</script>
